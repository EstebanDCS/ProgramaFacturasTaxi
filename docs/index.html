<body id="cuerpo-app">
    <div id="aviso-guardado">💾 Guardado local</div>
    <nav id="sidebar">
        <div class="brand">
            <h4 class="text-white fw-bold mb-0">TAXI APP</h4>
            <small>Panel de Control</small>
        </div>
        <div class="nav flex-column mt-4">
            <div class="nav-link active" onclick="verSec('nueva', this)">📝 Nueva Factura</div>
            <div class="nav-link" onclick="verSec('historial', this); cargarHistorial();">📊 Historial Cloud</div>
            <div class="mt-5 pt-5 border-top border-secondary">
                <div class="nav-link text-danger" onclick="location.reload()">🚪 Salir</div>
            </div>
        </div>
    </nav>

    <main id="main-content">
        <div id="sec-login" class="container mt-5" style="max-width: 420px;">
            <div class="card p-5 border-0 shadow-lg text-center rounded-4">
                <h2 class="fw-bold mb-4">Acceso</h2>
                <input type="password" id="pass-master" class="form-control mb-3 text-center py-3" placeholder="Contraseña">
                <button class="btn btn-primary w-100 py-3 fw-bold" onclick="iniciarSesion()">ENTRAR</button>
            </div>
        </div>

        <div id="nueva" class="seccion container">
            </div>

        <div id="historial" class="seccion container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="fw-bold m-0">Historial en Frankfurt</h1>
                <div>
                    <button class="btn btn-sm btn-outline-danger" onclick="vaciarHistorial()">🗑️ Vaciar Nube</button>
                </div>
            </div>
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-dark text-white">
                            <tr>
                                <th class="p-4">Fecha</th>
                                <th>Barco</th>
                                <th>Nº Factura</th>
                                <th>Total</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-historial"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // [Mantener variables y radar]
        let tokenSeguridad = "";
        let URL_BASE = 'https://programafacturastaxi.onrender.com';
        if (window.location.hostname !== "programa-facturas-taxi.vercel.app") {
            URL_BASE = 'https://programafacturastaxi-dev.onrender.com';
            document.body.classList.add('modo-pruebas');
        }

        async function cargarHistorial() {
            const res = await fetch(`${URL_BASE}/historial`, { headers: {'x-password': tokenSeguridad} });
            const datos = await res.json();
            const tb = document.getElementById('tabla-historial'); 
            tb.innerHTML = "";
            datos.forEach(f => {
                tb.innerHTML += `
                <tr>
                    <td class="p-4 small">${new Date(f.fecha_creacion).toLocaleString()}</td>
                    <td><span class="badge bg-primary">${f.barco}</span></td>
                    <td>${f.numero_factura}</td>
                    <td class="fw-bold text-success">${f.importe_total.toFixed(2)}€</td>
                    <td>
                        <button class="btn btn-sm btn-info text-white shadow-sm fw-bold" onclick="redescargar(${f.id})">
                            🔄 Re-descargar
                        </button>
                    </td>
                </tr>`;
            });
        }

        async function redescargar(id) {
            const res = await fetch(`${URL_BASE}/re-descargar/${id}`, { headers: {'x-password': tokenSeguridad} });
            if (res.ok) {
                const blob = await res.blob();
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `Copia_Factura_${id}.xlsm`; a.click();
            }
        }

        async function vaciarHistorial() {
            if(!confirm("¿Borrar TODAS las facturas de la nube?")) return;
            const res = await fetch(`${URL_BASE}/limpiar-historial`, { method: 'DELETE', headers: {'x-password': tokenSeguridad} });
            if(res.ok) { alert("Nube vaciada"); cargarHistorial(); }
        }

        // [Mantener el resto de tus funciones de agregarTicket, iniciarSesion, etc.]
    </script>
</body>
