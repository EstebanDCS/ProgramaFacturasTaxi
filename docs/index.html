<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Taxi - Facturación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4 mb-5" style="max-width: 800px;">
        <h2 class="text-center mb-4">Crear Factura Taxi</h2>
        
        <form id="formTaxi">
            <div class="card p-3 mb-4 shadow-sm border-primary">
                <h5 class="text-primary border-bottom pb-2">Datos de Factura</h5>
                <div class="row g-2 mt-2">
                    <div class="col-sm-6">
                        <label class="form-label fw-bold">Nº Factura</label>
                        <input type="text" id="factura_numero" class="form-control" placeholder="Ej: 2026-001" required>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-bold">Barco</label>
                        <input type="text" id="barco" class="form-control" required>
                    </div>
                    <div class="col-12 mt-3">
                        <label class="form-label fw-bold">Cliente / Empresa</label>
                        <input type="text" id="cliente" class="form-control" placeholder="Nombre del cliente" required>
                    </div>
                </div>
            </div>

            <div class="card p-3 mb-4 shadow-sm border-success">
                <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                    <h5 class="text-success m-0">Tickets del Viaje</h5>
                    <button type="button" class="btn btn-sm btn-outline-success fw-bold" onclick="agregarTicket()">+ Añadir Ticket</button>
                </div>
                
                <div id="contenedor-tickets">
                    </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow fs-5">GENERAR FACTURA FINAL</button>
        </form>
    </div>
    
    <script>
        let ticketCount = 0;

        // Función para crear una nueva tarjeta de ticket en la pantalla
        function agregarTicket() {
            ticketCount++;
            const div = document.createElement('div');
            div.className = 'border p-3 mb-3 bg-white rounded shadow-sm ticket-item';
            div.innerHTML = `
                <div class="d-flex justify-content-between">
                    <h6 class="text-secondary fw-bold">Ticket #${ticketCount}</h6>
                    ${ticketCount > 1 ? `<button type="button" class="btn-close btn-sm" onclick="this.parentElement.parentElement.remove()"></button>` : ''}
                </div>
                <div class="row g-2 mt-1">
                    <div class="col-6">
                        <label class="form-label text-muted small mb-1">Nº Ticket</label>
                        <input type="text" class="form-control form-control-sm t-numero" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label text-muted small mb-1">Importe (€)</label>
                        <input type="number" step="0.01" class="form-control form-control-sm t-importe" required>
                    </div>
                    <div class="col-12 mt-2">
                        <label class="form-label text-muted small mb-1">Fechas de solicitud (Texto libre, ej: 12/04 y 13/04)</label>
                        <input type="text" class="form-control form-control-sm t-solicitud" required>
                    </div>
                    <div class="col-12 mt-2">
                        <label class="form-label text-muted small mb-1">Fecha de fin de servicio (Para calcular la mayor)</label>
                        <input type="date" class="form-control form-control-sm t-fecha-principal" required>
                    </div>
                </div>
            `;
            document.getElementById('contenedor-tickets').appendChild(div);
        }

        // Mostrar un ticket vacío al cargar la página
        window.onload = agregarTicket;

        // Enviar datos al servidor
        document.getElementById('formTaxi').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const tickets = [];
            document.querySelectorAll('.ticket-item').forEach(item => {
                tickets.push({
                    numero: item.querySelector('.t-numero').value,
                    importe: parseFloat(item.querySelector('.t-importe').value),
                    fechas_solicitud: item.querySelector('.t-solicitud').value,
                    fecha_principal: item.querySelector('.t-fecha-principal').value
                });
            });

            const datos = {
                factura_numero: document.getElementById('factura_numero').value,
                barco: document.getElementById('barco').value,
                cliente: document.getElementById('cliente').value,
                tickets: tickets
            };

            const boton = e.target.querySelector('button[type="submit"]');
            boton.innerText = "Calculando y Generando Excel...";
            boton.disabled = true;

            try {
                // TU ENLACE REAL DE RENDER
                const URL_RENDER = 'https://programafacturastaxi.onrender.com/generar'; 
                
                const res = await fetch(URL_RENDER, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                
                if(res.ok) {
                    const blob = await res.blob();
                    const a = document.createElement('a');
                    a.href = window.URL.createObjectURL(blob);
                    a.download = 'Factura_' + datos.factura_numero + '.xlsm';
                    a.click();
                } else {
                    alert("Error en el servidor. Revisa si Render está encendido.");
                }
            } catch (err) {
                alert("Error de conexión. Render suele tardar 30 segundos en arrancar si lleva rato apagado. Vuelve a pulsar el botón.");
            }
            
            boton.innerText = "GENERAR FACTURA FINAL";
            boton.disabled = false;
        });
    </script>
</body>
</html>
