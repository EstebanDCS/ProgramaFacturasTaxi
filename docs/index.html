<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi App Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --sidebar-w: 260px; --dark: #1e1e2d; --primary: #0d6efd; }
        body { background: #f4f7f6; margin: 0; display: flex; min-height: 100vh; font-family: sans-serif; }
        
        #sidebar { 
            width: var(--sidebar-w); background: var(--dark); color: #a2a3b7; 
            height: 100vh; position: fixed; left: 0; top: 0; display: none; flex-direction: column;
            z-index: 1000; box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }
        .sidebar-brand { padding: 25px; text-align: center; border-bottom: 1px solid #2c2c3e; color: white; font-weight: bold; }
        .nav-link { 
            color: #a2a3b7; padding: 18px 25px; cursor: pointer; border-left: 4px solid transparent; 
            transition: 0.3s; text-decoration: none; display: block;
        }
        .nav-link:hover, .nav-link.active { color: white; background: #2c2c3e; border-left-color: var(--primary); }
        
        #main-content { flex: 1; padding: 40px; width: 100%; transition: 0.3s; }
        body.logged-in #sidebar { display: flex; }
        body.logged-in #main-content { margin-left: var(--sidebar-w); }

        .seccion { display: none; }
        .seccion.activa { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .ticket-card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; background: white; overflow: hidden; }
        .ticket-header { padding: 15px 20px; background: #198754; color: white; cursor: pointer; font-weight: bold; }
        .hidden-field { display: none; }
        #aviso-guardado { position: fixed; bottom: 20px; right: 20px; background: #000; color: #fff; padding: 10px 25px; border-radius: 50px; display: none; z-index: 2000; }
        
        #sec-login { max-width: 400px; margin: 100px auto; width: 100%; }
        body.modo-pruebas #sidebar { background: #4a1414; }
    </style>
</head>
<body id="cuerpo-app">

    <div id="aviso-guardado">💾 Guardado</div>
    <datalist id="sugerencias-pasajeros"></datalist>

    <nav id="sidebar">
        <div class="sidebar-brand text-uppercase ls-1">Taxi App Pro</div>
        <div class="mt-4">
            <div class="nav-link active" id="btn-nueva" onclick="verSec('sec-nueva', this)">📝 Nueva Factura</div>
            <div class="nav-link" id="btn-historial" onclick="verSec('sec-historial', this); cargarHistorial();">📊 Historial Cloud</div>
            <div class="nav-link text-danger mt-5 pt-5 border-top border-secondary" onclick="location.reload()">🚪 Salir</div>
        </div>
    </nav>

    <main id="main-content">
        <div id="sec-login">
            <div class="card p-5 shadow-lg border-0 rounded-4 text-center">
                <h3 class="fw-bold mb-4">Acceso</h3>
                <input type="password" id="pass-maestra" class="form-control mb-3 py-3 text-center" placeholder="Contraseña">
                <button class="btn btn-primary w-100 py-3 fw-bold" onclick="iniciarSesion()">ENTRAR</button>
            </div>
        </div>

        <div id="sec-nueva" class="seccion">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold m-0">Generar Factura</h2>
                <button class="btn btn-sm btn-outline-warning" onclick="limpiarBorrador(true)">🗑️ Limpiar</button>
            </div>
            
            <form id="formTaxi">
                <div class="card p-4 mb-4 border-0 shadow-sm rounded-4 bg-white">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="small fw-bold">Nº FACTURA</label><input type="text" id="factura_numero" class="form-control" required></div>
                        <div class="col-md-6"><label class="small fw-bold">BARCO</label><input type="text" id="barco" class="form-control" required></div>
                    </div>
                </div>
                <div id="contenedor-tickets"></div>
                <button type="button" class="btn btn-outline-primary w-100 py-3 mb-4 fw-bold rounded-3" onclick="agregarTicket()">+ AÑADIR TICKET DETALLADO</button>
                <button type="submit" class="btn btn-primary w-100 py-4 fw-bold shadow-lg fs-5 rounded-4 text-uppercase">Guardar y Descargar</button>
            </form>
        </div>

        <div id="sec-historial" class="seccion">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold m-0">Historial en Frankfurt</h2>
                <button class="btn btn-sm btn-danger" onclick="vaciarHistorial()">🗑️ Vaciar Nube</button>
            </div>
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-dark">
                        <tr><th class="p-3">Fecha</th><th>Barco</th><th>Nº Factura</th><th>Importe</th><th>Acción</th></tr>
                    </thead>
                    <tbody id="tabla-historial"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let ticketCount = 0; let tokenSeguridad = "";
        let URL_BASE = 'https://programafacturastaxi.onrender.com';
        if (window.location.hostname !== "programa-facturas-taxi.vercel.app") {
            URL_BASE = 'https://programafacturastaxi-dev.onrender.com';
            document.body.classList.add('modo-pruebas');
        }

        function verSec(id, btn) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
        }

        async function iniciarSesion() {
            const p = document.getElementById('pass-maestra').value;
            const res = await fetch(`${URL_BASE}/login`, { headers: {'x-password': p} });
            if(res.ok) {
                tokenSeguridad = p; document.body.classList.add('logged-in');
                document.getElementById('sec-login').style.display='none';
                verSec('sec-nueva', document.getElementById('btn-nueva'));
                if(!cargarProgreso()) agregarTicket();
            } else { alert("Error"); }
        }

        function agregarTicket() {
            ticketCount++; const id = ticketCount;
            const div = document.createElement('div');
            div.className = 'ticket-card';
            div.innerHTML = `
                <div class="ticket-header" onclick="toggleT(${id})">
                    <div class="d-flex justify-content-between align-items-center">
                        <span>TICKET #${id}</span>
                        <span id="icon_${id}">🔽</span>
                    </div>
                </div>
                <div class="p-4" id="body_${id}">
                    <div class="row g-3">
                        <div class="col-md-4"><label class="small fw-bold text-danger">Nº TICKET</label><input type="text" class="form-control t-numero-ticket" required></div>
                        <div class="col-md-4"><label class="small fw-bold">CONTACTO</label><select class="form-select t-contacto"><option value="whatsapp">Whatsapp</option><option value="telefono">Teléfono</option></select></div>
                        <div class="col-md-4"><label class="small fw-bold text-success">IMPORTE (€)</label><input type="number" step="0.01" class="form-control t-importe" required></div>
                        
                        <div class="col-12 p-3 bg-light rounded"><label class="small fw-bold mb-2 d-block">PASAJEROS</label><div id="pax_${id}"><input type="text" class="form-control t-pasajeros mb-1" list="sugerencias-pasajeros"></div><button type="button" class="btn btn-sm btn-link p-0" onclick="addP(${id})">+ Añadir</button></div>
                        
                        <div class="col-md-6"><label class="small fw-bold">FECHA SOLICITUD</label><input type="date" class="form-control t-fechas-solicitud" required></div>
                        <div class="col-md-6"><label class="small fw-bold">FECHA SERVICIO</label><input type="date" class="form-control t-fechas-servicio" required></div>

                        <div class="col-md-6 p-3 border rounded">
                            <label class="small fw-bold text-primary">RECOGIDA</label>
                            <div class="form-check"><input type="checkbox" class="form-check-input t-o-aero"><label>Aeropuerto</label></div>
                            <div class="form-check"><input type="checkbox" class="form-check-input t-o-buque"><label>Buque</label></div>
                            <div class="form-check"><input type="checkbox" class="form-check-input t-o-hotel" onchange="toggleI(this, 'oh_${id}')"><label>Hotel</label></div>
                            <input type="text" id="oh_${id}" class="form-control form-control-sm mt-1 hidden-field t-o-hotel-texto" placeholder="Hotel...">
                        </div>
                        <div class="col-md-6 p-3 border rounded">
                            <label class="small fw-bold text-primary">DESTINO</label>
                            <div class="form-check"><input type="checkbox" class="form-check-input t-d-aero"><label>Aeropuerto</label></div>
                            <div class="form-check"><input type="checkbox" class="form-check-input t-d-buque"><label>Buque</label></div>
                            <div class="form-check"><input type="checkbox" class="form-check-input t-d-hotel" onchange="toggleI(this, 'dh_${id}')"><label>Hotel</label></div>
                            <input type="text" id="dh_${id}" class="form-control form-control-sm mt-1 hidden-field t-d-hotel-texto" placeholder="Hotel...">
                        </div>
                        <div class="col-12"><div class="form-check form-switch"><input type="checkbox" class="form-check-input t-ida-vuelta"><label class="fw-bold small">¿Ida y Vuelta?</label></div><textarea class="form-control mt-2 t-comentarios" placeholder="Observaciones..."></textarea></div>
                    </div>
                </div>`;
            document.getElementById('contenedor-tickets').appendChild(div);
            guardarProgreso();
        }

        function toggleT(id) { const b = document.getElementById(`body_${id}`); b.style.display = b.style.display==='none'?'block':'none'; }
        function toggleI(cb, id) { document.getElementById(id).style.display = cb.checked?'block':'none'; }
        function addP(id) { const i = document.createElement('input'); i.className='form-control t-pasajeros mb-1'; i.list="sugerencias-pasajeros"; document.getElementById(`pax_${id}`).appendChild(i); }

        document.getElementById('formTaxi').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tickets = Array.from(document.querySelectorAll('.ticket-card')).map(item => ({
                numero_ticket: item.querySelector('.t-numero-ticket').value,
                importe: parseFloat(item.querySelector('.t-importe').value),
                pasajeros: Array.from(item.querySelectorAll('.t-pasajeros')).map(i => i.value).filter(v => v)
                // Se pueden añadir el resto de campos siguiendo este patrón
            }));
            const data = { factura_numero: document.getElementById('factura_numero').value, barco: document.getElementById('barco').value, tickets };
            const res = await fetch(`${URL_BASE}/generar`, { method:'POST', headers:{'Content-Type':'application/json','x-password':tokenSeguridad}, body:JSON.stringify(data)});
            if(res.ok) {
                const b = await res.blob(); const url = window.URL.createObjectURL(b); const a = document.createElement('a');
                a.href = url; a.download = `${data.barco}.xlsm`; a.click(); alert("Guardado y descargado");
            }
        });

        async function cargarHistorial() {
            const res = await fetch(`${URL_BASE}/historial`, { headers: {'x-password':tokenSeguridad} });
            const datos = await res.json();
            const tb = document.getElementById('tabla-historial'); tb.innerHTML = "";
            datos.forEach(f => {
                tb.innerHTML += `<tr><td class="p-3 small text-muted">${new Date(f.fecha_creacion).toLocaleString()}</td><td><span class="badge bg-primary">${f.barco}</span></td><td>${f.numero_factura}</td><td class="fw-bold text-success">${f.importe_total.toFixed(2)}€</td><td><button class="btn btn-sm btn-info text-white fw-bold" onclick="redescargar(${f.id})">🔄 RE-DESCARGAR</button></td></tr>`;
            });
        }

        async function redescargar(id) {
            const res = await fetch(`${URL_BASE}/re-descargar/${id}`, { headers: {'x-password':tokenSeguridad} });
            if(res.ok) {
                const b = await res.blob(); const url = window.URL.createObjectURL(b);
                const a = document.createElement('a'); a.href = url; a.download = `Copia_Factura_${id}.xlsm`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            } else { alert("Error al descargar"); }
        }

        async function vaciarHistorial() {
            if(!confirm("¿Borrar todo?")) return;
            await fetch(`${URL_BASE}/limpiar-historial`, { method: 'DELETE', headers: {'x-password':tokenSeguridad} });
            cargarHistorial();
        }

        function guardarProgreso() { localStorage.setItem('taxi_vfinal', JSON.stringify({html: document.getElementById('contenedor-tickets').innerHTML, count: ticketCount, b: document.getElementById('barco').value, f: document.getElementById('factura_numero').value})); }
        function cargarProgreso() {
            const s = localStorage.getItem('taxi_vfinal'); if(!s) return false;
            const p = JSON.parse(s); document.getElementById('contenedor-tickets').innerHTML = p.html; ticketCount = p.count; document.getElementById('barco').value = p.b; document.getElementById('factura_numero').value = p.f;
            return true;
        }
        function limpiarBorrador(q) { if(q && !confirm("¿Borrar todo?")) return; localStorage.removeItem('taxi_vfinal'); location.reload(); }
    </script>
</body>
</html>
