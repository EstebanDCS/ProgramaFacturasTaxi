<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Taxi - Facturación Segura</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1048/1048313.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> 
        .hidden-field { display: none; } 
        .ticket-header { cursor: pointer; transition: background-color 0.2s; }
        .ticket-header:hover { background-color: #146c43 !important; }
        /* Aviso visual de guardado automático */
        #aviso-guardado {
            position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); 
            color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem;
            display: none; z-index: 1000;
        }
    </style>
</head>
<body class="bg-light" id="cuerpo-app">

    <datalist id="sugerencias-pasajeros"></datalist>

    <div id="aviso-guardado">💾 Progreso guardado automáticamente</div>

    <div id="pantalla-login" class="container mt-5" style="max-width: 400px;">
        <div class="card p-4 shadow-lg border-primary text-center mt-5">
            <h3 class="mb-4 text-primary fw-bold">Acceso Privado</h3>
            <p class="text-muted small mb-3">Introduce tu contraseña maestra para acceder a la aplicación.</p>
            
            <div class="input-group mb-3">
                <input type="password" id="input-password" class="form-control text-center" placeholder="Contraseña">
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">👁️</button>
            </div>
            
            <button id="btn-login" class="btn btn-primary w-100 fw-bold py-2" onclick="iniciarSesion()">ENTRAR</button>
            <p id="error-login" class="text-danger mt-3 fw-bold" style="display:none;">Acceso denegado. Contraseña incorrecta.</p>
        </div>
    </div>

    <div id="pantalla-app" class="container mt-3 mb-5" style="max-width: 900px; display: none;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="m-0">Crear Factura Taxi</h2>
            <div>
                <button class="btn btn-sm btn-outline-warning me-2" onclick="limpiarBorrador(true)">🗑️ Limpiar Todo</button>
                <button class="btn btn-sm btn-outline-danger" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
        
        <form id="formTaxi">
            <div class="card p-3 mb-3 shadow-sm border-primary">
                <h6 class="text-primary border-bottom pb-2">Datos generales (Hoja Principal)</h6>
                <div class="row g-2 mt-1">
                    <div class="col-sm-6"><label class="form-label fw-bold">Nº Factura / Servicio</label><input type="text" id="factura_numero" class="form-control" required></div>
                    <div class="col-sm-6"><label class="form-label fw-bold">Nombre del Barco</label><input type="text" id="barco" class="form-control" required></div>
                </div>
            </div>

            <div id="contenedor-tickets"></div>

            <button type="button" class="btn btn-outline-success fw-bold w-100 mb-3 py-2" onclick="agregarTicket()">+ Añadir Nuevo Ticket</button>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow fs-5">GENERAR FACTURA (.XLSM)</button>
        </form>
    </div>
    
    <script>
        let ticketCount = 0;
        let tokenSeguridad = ""; 
        let nombresGuardados = new Set(); 

        // ==========================================
        // 🌟 EL RADAR INTELIGENTE (VERCEL & RENDER)
        // ==========================================
        // Servidor Oficial (Rama Main)
        let URL_BASE = 'https://programafacturastaxi.onrender.com'; 
        
        const host = window.location.hostname;
        
        // Servidor de Pruebas (Rama Development / Localhost)
        if (host.includes("development") || host === "localhost" || window.location.search.includes('preview')) {
            // Nota: Aquí pones el nombre de tu segundo servidor Render (staging) si lo creaste
            URL_BASE = 'https://programafacturastaxi-dev.onrender.com'; 
            console.log("⚠️ MODO PRUEBAS ACTIVADO -> Conectando a: " + URL_BASE);
            
            // Pintar fondo rojo para avisarte visualmente
            const cuerpo = document.getElementById('cuerpo-app');
            if(cuerpo) {
                cuerpo.style.backgroundColor = "#ffe6e6"; 
                cuerpo.classList.remove('bg-light');
            }
        }

        // ==========================================
        // 💾 SISTEMA DE AUTO-GUARDADO
        // ==========================================
        document.getElementById('formTaxi').addEventListener('input', triggerAutoGuardado);
        document.getElementById('formTaxi').addEventListener('change', triggerAutoGuardado);

        let timeoutGuardado;
        function triggerAutoGuardado() {
            clearTimeout(timeoutGuardado);
            timeoutGuardado = setTimeout(guardarProgreso, 500);
        }

        function guardarProgreso() {
            const ticketsHTML = document.getElementById('contenedor-tickets').innerHTML;
            const inputs = document.querySelectorAll('#formTaxi input, #formTaxi select, #formTaxi textarea');
            const valores = [];
            
            inputs.forEach(input => {
                if(input.type === 'checkbox' || input.type === 'radio') {
                    valores.push({ id: input.id, classList: Array.from(input.classList), checked: input.checked });
                } else {
                    valores.push({ id: input.id, classList: Array.from(input.classList), value: input.value });
                }
            });

            const progreso = { html: ticketsHTML, count: ticketCount, data: valores };
            localStorage.setItem('borradorFacturaTaxi', JSON.stringify(progreso));
            
            const aviso = document.getElementById('aviso-guardado');
            aviso.style.display = 'block';
            setTimeout(() => aviso.style.display = 'none', 1500);
        }

        function cargarProgreso() {
            const guardado = localStorage.getItem('borradorFacturaTaxi');
            if(guardado) {
                const progreso = JSON.parse(guardado);
                
                document.getElementById('contenedor-tickets').innerHTML = progreso.html;
                ticketCount = progreso.count;

                const inputs = document.querySelectorAll('#formTaxi input, #formTaxi select, #formTaxi textarea');
                inputs.forEach((input, index) => {
                    if(progreso.data[index]) {
                        if(input.type === 'checkbox' || input.type === 'radio') {
                            input.checked = progreso.data[index].checked;
                            if(input.onchange) input.onchange(); 
                        } else {
                            input.value = progreso.data[index].value;
                        }
                    }
                });
                return true; 
            }
            return false; 
        }

        function limpiarBorrador(preguntar = false) {
            if(preguntar && !confirm("¿Seguro que quieres borrar todo el progreso actual y empezar de cero?")) return;
            localStorage.removeItem('borradorFacturaTaxi');
            document.getElementById('formTaxi').reset();
            document.getElementById('contenedor-tickets').innerHTML = '';
            ticketCount = 0;
            agregarTicket();
        }

        // ==========================================
        // FUNCIONALIDADES PRINCIPALES
        // ==========================================
        function registrarNombre(nombre) {
            if (!nombre) return;
            const nombreLimpio = nombre.trim();
            if (nombreLimpio !== "" && !nombresGuardados.has(nombreLimpio)) {
                nombresGuardados.add(nombreLimpio);
                const datalist = document.getElementById('sugerencias-pasajeros');
                const option = document.createElement('option');
                option.value = nombreLimpio;
                datalist.appendChild(option);
            }
        }

        function togglePassword() {
            const pwdInput = document.getElementById("input-password");
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
            } else {
                pwdInput.type = "password";
            }
        }

        async function iniciarSesion() {
            const pwd = document.getElementById("input-password").value;
            const btn = document.getElementById("btn-login");
            const msjError = document.getElementById("error-login");
            
            if(!pwd) return;
            
            btn.innerText = "Comprobando...";
            btn.disabled = true;
            msjError.style.display = "none";

            try {
                // LLAMADA AL SERVIDOR CORRECTO
                const res = await fetch(URL_BASE + '/login', {
                    method: 'POST',
                    headers: { 'x-password': pwd }
                });
                
                if (res.ok) {
                    tokenSeguridad = pwd;
                    document.getElementById("pantalla-login").style.display = "none";
                    document.getElementById("pantalla-app").style.display = "block";
                    
                    const habiaBorrador = cargarProgreso();
                    if(!habiaBorrador && ticketCount === 0) {
                        agregarTicket(); 
                    }
                } else {
                    msjError.style.display = "block";
                }
            } catch(e) {
                alert("Error al conectar. ¿Está Render encendido?");
            }
            btn.innerText = "ENTRAR";
            btn.disabled = false;
        }

        function cerrarSesion() {
            tokenSeguridad = "";
            document.getElementById("input-password").value = "";
            document.getElementById("input-password").type = "password"; 
            document.getElementById("pantalla-app").style.display = "none";
            document.getElementById("pantalla-login").style.display = "block";
        }

        function toggleInput(checkbox, inputId) {
            document.getElementById(inputId).style.display = checkbox.checked ? 'block' : 'none';
        }

        function addDynamicField(containerId, className, inputType, placeholderTxt = "", isRequired = true, listId = "") {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'd-flex mb-1 mt-1';
            const req = isRequired ? "required" : "";
            const listAttr = listId ? `list="${listId}" onchange="registrarNombre(this.value)"` : "";
            
            div.innerHTML = `
                <input type="${inputType}" class="form-control form-control-sm ${className}" placeholder="${placeholderTxt}" ${req} ${listAttr}>
                <button type="button" class="btn btn-sm btn-outline-danger ms-1" onclick="this.parentElement.remove(); triggerAutoGuardado();">X</button>
            `;
            container.appendChild(div);
            triggerAutoGuardado(); 
        }

        function toggleTicketDisplay(id) {
            const body = document.getElementById(`ticket_body_${id}`);
            const icon = document.getElementById(`toggle_icon_${id}`);
            if (body.style.display === 'none') {
                body.style.display = 'block';
                icon.innerText = '🔽';
            } else {
                body.style.display = 'none';
                icon.innerText = '▶️';
            }
        }

        function agregarTicket() {
            const allBodies = document.querySelectorAll('.ticket-body');
            const allIcons = document.querySelectorAll('.toggle-icon');
            allBodies.forEach(b => b.style.display = 'none');
            allIcons.forEach(i => i.innerText = '▶️');

            ticketCount++;
            const tId = ticketCount;
            const div = document.createElement('div');
            div.className = 'card mb-3 bg-white rounded shadow-sm ticket-item border-success';
            
            div.innerHTML = `
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center ticket-header" onclick="toggleTicketDisplay(${tId})">
                    <h6 class="m-0 fw-bold">Ticket Detallado #${tId}</h6>
                    <div>
                        <span id="toggle_icon_${tId}" class="toggle-icon me-3 fw-bold">🔽</span>
                        ${tId > 1 ? `<button type="button" class="btn-close btn-close-white btn-sm" onclick="event.stopPropagation(); this.parentElement.parentElement.parentElement.remove(); triggerAutoGuardado();"></button>` : ''}
                    </div>
                </div>
                
                <div class="card-body ticket-body" id="ticket_body_${tId}">
                    <div class="row g-2">
                        <div class="col-sm-4">
                            <label class="form-label text-muted small mb-1 fw-bold text-danger">Nº de Ticket Físico</label>
                            <input type="text" class="form-control form-control-sm border-danger t-numero-ticket" placeholder="Ej: 0045" required>
                        </div>
                        <div class="col-sm-4">
                            <label class="form-label text-muted small mb-1">Contacto</label>
                            <select class="form-select form-select-sm t-contacto" required>
                                <option value="whatsapp">Whatsapp</option>
                                <option value="telefono">Teléfono</option>
                                <option value="whatsapp y telefono">Whatsapp y Teléfono</option>
                            </select>
                        </div>
                        <div class="col-sm-4">
                            <label class="form-label text-muted small mb-1 fw-bold text-success">Importe Total (€)</label>
                            <input type="number" step="0.01" class="form-control form-control-sm t-importe" required>
                        </div>

                        <div class="col-12 mt-2 border rounded p-2 bg-light">
                            <label class="form-label text-muted small mb-1 fw-bold">Nombre Pasajeros / Tripulantes (Opcional)</label>
                            <div id="pasajeros_${tId}">
                                <div class="d-flex mb-1">
                                    <input type="text" class="form-control form-control-sm t-pasajeros" placeholder="Nombre del tripulante" list="sugerencias-pasajeros" onchange="registrarNombre(this.value)">
                                </div>
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-primary mt-1" onclick="addDynamicField('pasajeros_${tId}', 't-pasajeros', 'text', 'Nombre del tripulante', false, 'sugerencias-pasajeros')">+ Añadir Tripulante</button>
                        </div>

                        <div class="col-sm-6 mt-2 border rounded p-2 bg-light">
                            <label class="form-label text-muted small mb-1 fw-bold">Fechas de Solicitud</label>
                            <div id="solicitudes_${tId}">
                                <div class="d-flex mb-1"><input type="date" class="form-control form-control-sm t-fechas-solicitud" required></div>
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-primary mt-1" onclick="addDynamicField('solicitudes_${tId}', 't-fechas-solicitud', 'date', '', true)">+ Añadir Fecha</button>
                        </div>
                        
                        <div class="col-sm-6 mt-2 border rounded p-2 bg-light">
                            <label class="form-label text-muted small mb-1 fw-bold">Fechas de Realización (Servicio)</label>
                            <div id="servicios_${tId}">
                                <div class="d-flex mb-1"><input type="date" class="form-control form-control-sm t-fechas-servicio" required></div>
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-primary mt-1" onclick="addDynamicField('servicios_${tId}', 't-fechas-servicio', 'date', '', true)">+ Añadir Fecha</button>
                        </div>

                        <div class="col-sm-6 mt-3 border rounded p-3 bg-light">
                            <label class="form-label fw-bold small mb-2 text-primary">RECOGIDA (Puedes marcar varias)</label>
                            <div class="form-check"><input class="form-check-input t-o-aero" type="checkbox"><label class="form-check-label">Aeropuerto</label></div>
                            <div class="form-check"><input class="form-check-input t-o-buque" type="checkbox"><label class="form-check-label">Buque</label></div>
                            
                            <div class="form-check mt-1">
                                <input class="form-check-input t-o-hotel" type="checkbox" onchange="toggleInput(this, 'o_hotel_ext_${tId}'); triggerAutoGuardado();">
                                <label class="form-check-label">Hotel</label>
                            </div>
                            <input type="text" id="o_hotel_ext_${tId}" class="form-control form-control-sm mb-2 hidden-field t-o-hotel-texto" placeholder="Nombre de los hoteles...">
                            
                            <div class="form-check mt-1">
                                <input class="form-check-input t-o-otros" type="checkbox" onchange="toggleInput(this, 'o_otros_ext_${tId}'); triggerAutoGuardado();">
                                <label class="form-check-label">Otros</label>
                            </div>
                            <input type="text" id="o_otros_ext_${tId}" class="form-control form-control-sm hidden-field t-o-otros-texto" placeholder="¿Dónde?">
                        </div>

                        <div class="col-sm-6 mt-3 border rounded p-3 bg-light">
                            <label class="form-label fw-bold small mb-2 text-primary">DESTINO (Puedes marcar varias)</label>
                            <div class="row">
                                <div class="col-6">
                                    <div class="form-check"><input class="form-check-input t-d-aero" type="checkbox"><label class="form-check-label">Aeropuerto</label></div>
                                    <div class="form-check"><input class="form-check-input t-d-buque" type="checkbox"><label class="form-check-label">Buque</label></div>
                                    <div class="form-check"><input class="form-check-input t-d-inmigracion" type="checkbox"><label class="form-check-label">Inmigración</label></div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check">
                                        <input class="form-check-input t-d-hotel" type="checkbox" onchange="toggleInput(this, 'd_hotel_ext_${tId}'); triggerAutoGuardado();"><label class="form-check-label">Hotel</label>
                                    </div>
                                    <input type="text" id="d_hotel_ext_${tId}" class="form-control form-control-sm mb-1 hidden-field t-d-hotel-texto" placeholder="¿Qué hotel?">
                                    
                                    <div class="form-check">
                                        <input class="form-check-input t-d-hospital" type="checkbox" onchange="toggleInput(this, 'd_hosp_ext_${tId}'); triggerAutoGuardado();"><label class="form-check-label">Hospital</label>
                                    </div>
                                    <input type="text" id="d_hosp_ext_${tId}" class="form-control form-control-sm mb-1 hidden-field t-d-hosp-texto" placeholder="¿Qué hospital?">
                                    
                                    <div class="form-check">
                                        <input class="form-check-input t-d-clinica" type="checkbox" onchange="toggleInput(this, 'd_clin_ext_${tId}'); triggerAutoGuardado();"><label class="form-check-label">Clínica</label>
                                    </div>
                                    <input type="text" id="d_clin_ext_${tId}" class="form-control form-control-sm mb-1 hidden-field t-d-clin-texto" placeholder="¿Qué clínica?">
                                    
                                    <div class="form-check">
                                        <input class="form-check-input t-d-otros" type="checkbox" onchange="toggleInput(this, 'd_otros_ext_${tId}'); triggerAutoGuardado();"><label class="form-check-label">Otros</label>
                                    </div>
                                    <input type="text" id="d_otros_ext_${tId}" class="form-control form-control-sm hidden-field t-d-otros-texto" placeholder="¿Dónde?">
                                </div>
                            </div>
                        </div>

                        <div class="col-12 mt-3">
                            <div class="form-check form-switch fs-6 mb-2">
                                <input class="form-check-input t-ida-vuelta" type="checkbox">
                                <label class="form-check-label fw-bold small">¿Servicio de Ida y Vuelta?</label>
                            </div>
                            <label class="form-label text-muted small mb-1">Comentarios / Observaciones</label>
                            <textarea class="form-control t-comentarios" rows="2"></textarea>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('contenedor-tickets').appendChild(div);
            triggerAutoGuardado(); 
        }

        document.getElementById('formTaxi').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const ticketsData = [];
            const ticketsCards = document.querySelectorAll('.ticket-item');
            
            for (let i = 0; i < ticketsCards.length; i++) {
                const item = ticketsCards[i];

                ticketsData.push({
                    numero_ticket: item.querySelector('.t-numero-ticket').value, 
                    contacto_metodo: item.querySelector('.t-contacto').value,
                    fechas_solicitud: Array.from(item.querySelectorAll('.t-fechas-solicitud')).map(inp => inp.value).filter(v => v),
                    fechas_servicio: Array.from(item.querySelectorAll('.t-fechas-servicio')).map(inp => inp.value).filter(v => v),
                    pasajeros: Array.from(item.querySelectorAll('.t-pasajeros')).map(inp => inp.value).filter(v => v), 
                    
                    o_aeropuerto: item.querySelector('.t-o-aero').checked,
                    o_buque: item.querySelector('.t-o-buque').checked,
                    o_hotel: item.querySelector('.t-o-hotel').checked,
                    o_hotel_texto: item.querySelector('.t-o-hotel-texto').value,
                    o_otros: item.querySelector('.t-o-otros').checked,
                    o_otros_texto: item.querySelector('.t-o-otros-texto').value,
                    
                    d_aeropuerto: item.querySelector('.t-d-aero').checked,
                    d_buque: item.querySelector('.t-d-buque').checked,
                    d_hotel: item.querySelector('.t-d-hotel').checked,
                    d_hotel_texto: item.querySelector('.t-d-hotel-texto').value,
                    d_hospital: item.querySelector('.t-d-hospital').checked,
                    d_hospital_texto: item.querySelector('.t-d-hosp-texto').value,
                    d_clinica: item.querySelector('.t-d-clinica').checked,
                    d_clinica_texto: item.querySelector('.t-d-clin-texto').value,
                    d_inmigracion: item.querySelector('.t-d-inmigracion').checked,
                    d_otros: item.querySelector('.t-d-otros').checked,
                    d_otros_texto: item.querySelector('.t-d-otros-texto').value,
                    
                    ida_vuelta: item.querySelector('.t-ida-vuelta').checked,
                    comentarios: item.querySelector('.t-comentarios').value,
                    importe: parseFloat(item.querySelector('.t-importe').value)
                });
            }

            const datos_totales = {
                factura_numero: document.getElementById('factura_numero').value,
                barco: document.getElementById('barco').value,
                tickets: ticketsData
            };

            const boton = e.target.querySelector('button[type="submit"]');
            boton.innerText = "Generando Documento...";
            boton.disabled = true;

            try {
                // LLAMADA AL SERVIDOR CORRECTO
                const res = await fetch(URL_BASE + '/generar', { 
                    method: 'POST', 
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-password': tokenSeguridad 
                    }, 
                    body: JSON.stringify(datos_totales) 
                });
                
                if(res.ok) {
                    const blob = await res.blob();
                    const a = document.createElement('a'); 
                    a.href = window.URL.createObjectURL(blob);
                    
                    let nombreArchivo = datos_totales.barco + '.xlsm'; 
                    const disposition = res.headers.get('Content-Disposition');
                    if (disposition && disposition.includes('filename=')) {
                        nombreArchivo = disposition.split('filename=')[1].replace(/['"]/g, '');
                    }
                    
                    a.download = nombreArchivo; 
                    a.click();

                    limpiarBorrador(false);
                } else {
                    const err = await res.json(); 
                    alert("⚠️ Error al generar:\n" + (err.detail || err.error));
                }
            } catch (err) { 
                alert("⚠️ Error de conexión con el servidor."); 
            }
            
            boton.innerText = "GENERAR FACTURA (.XLSM)";
            boton.disabled = false;
        });

        // ARRANCADOR DE LA PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Registrado'));
        }
    </script>
</body>
</html>
