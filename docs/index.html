<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi App - Panel de Control</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f0f2f5; }
        
        /* Estilos Sidebar (Color Oscuro Corregido) */
        #sidebar { 
            width: 280px; 
            background: #212529; /* bg-dark de Bootstrap */
            position: fixed; 
            height: 100vh; 
            color: rgba(255,255,255,0.7);
        }
        .sidebar-header { 
            padding: 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            background: #1a1e21; /* Un tono más oscuro para la cabecera */
        }
        #sidebar .nav-link { 
            color: rgba(255,255,255,0.8); 
            padding: 15px 25px; 
            font-weight: 500; 
            cursor: pointer;
        }
        #sidebar .nav-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
        #sidebar .nav-link.active { 
            color: #fff; 
            background-color: #0d6efd; /* bg-primary */
            border-radius: 5px;
            margin: 0 10px;
        }

        /* Contenido Principal */
        #main-content { margin-left: 280px; padding: 40px; }
        .seccion { display: none; }
        .seccion.activa { display: block; }
        
        /* Estilos Tickets */
        .ticket-card { 
            border: 1px solid #e0e0e0; 
            border-radius: 10px; 
            background-color: #fff; 
            margin-bottom: 20px; 
            overflow: hidden;
        }
        .ticket-header { 
            padding: 15px 20px; 
            background-color: #198754; /* bg-success */
            color: #fff; 
            font-weight: bold; 
            cursor: pointer;
            border-bottom: 1px solid #e0e0e0;
        }
        .ticket-body { padding: 25px; }
        .hidden-field { display: none; }
        
        /* Utilidades */
        .ls-1 { tracking-spacing: 1px; }
    </style>
</head>
<body id="cuerpo-app">

    <datalist id="sugerencias-pasajeros"></datalist>

    <div id="wrapper" class="d-flex">
        <nav id="sidebar">
            <div class="sidebar-header d-flex items-center gap-3">
                <div class="bg-primary p-2 rounded text-white">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <div>
                    <h5 class="m-0 font-bold text-white ls-1">Taxi App</h5>
                    <small class="text-uppercase font-bold text-slate-500ls-1" style="font-size: 10px; color: #6c757d;">Admin Dashboard</small>
                </div>
            </div>
            <ul class="nav flex-column mt-3">
                <li class="nav-item">
                    <a id="btn-nueva" class="nav-link active" onclick="verSec('sec-nueva', this)">📝 Nueva Factura</a>
                </li>
                <li class="nav-item">
                    <a id="btn-historial" class="nav-link" onclick="verSec('sec-historial', this); cargarHistorial();">📊 Historial Cloud</a>
                </li>
            </ul>
        </nav>

        <main id="main-content" class="w-100">
            <div id="sec-nueva" class="seccion activa">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>📝 Generar Factura</h2>
                    <button class="btn btn-warning btn-sm" onclick="limpiarBorrador(true)">🗑️ Limpiar Borrador</button>
                </div>

                <form id="formTaxi">
                    <div class="card p-4 mb-4 shadow-sm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label font-bold text-slate-500">Nº Factura / Servicio</label>
                                <input type="text" id="factura_numero" required class="form-control" placeholder="Ej: F-0001">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label font-bold text-slate-500">Nombre del Barco</label>
                                <input type="text" id="barco" required class="form-control" placeholder="Ej: Santa María">
                            </div>
                        </div>
                    </div>

                    <div id="contenedor-tickets"></div>

                    <div class="d-grid gap-2">
                        <button type="button" class="btn btn-outline-primary" onclick="agregarTicket()">+ AÑADIR OTRO TICKET</button>
                        <button type="submit" class="btn btn-primary btn-lg mt-3">GUARDAR Y DESCARGAR EXCEL</button>
                    </div>
                </form>
            </div>

            <div id="sec-historial" class="seccion container-fluid">
                <h2>📊 Historial de Facturas</h2>
                <div class="card p-4 mt-3 shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Fecha</th>
                                    <th>Barco</th>
                                    <th>Factura Nº</th>
                                    <th>Total</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-historial"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let ticketCount = 0;
        let URL_BASE = 'https://programafacturastaxi.onrender.com';
        
        // Radar de Entorno
        if (window.location.hostname !== "programa-facturas-taxi.vercel.app") {
            URL_BASE = 'https://programafacturastaxi-dev.onrender.com';
            document.body.style.borderTop = "5px solid #ffc107";
        }

        function verSec(id, btn) {
            document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            document.querySelectorAll('#sidebar .nav-link').forEach(l => l.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleExt(cb, id) {
            const el = document.getElementById(id);
            if (cb.checked) el.classList.remove('hidden-field');
            else { el.classList.add('hidden-field'); el.value = ''; }
        }

        function addPax(id) {
            const i = document.createElement('input');
            i.className = 'form-control t-pasajeros form-control-sm mt-1';
            i.placeholder = "Nombre adicional"; i.list="sugerencias-pasajeros";
            document.getElementById(`pax_${id}`).appendChild(i);
        }

        // Generador de Tickets (Modelo Original Corregido)
        function agregarTicket() {
            ticketCount++; const id = ticketCount;
            const div = document.createElement('div');
            div.className = 'ticket-card';
            div.innerHTML = `
                <div class="ticket-header" onclick="document.getElementById('body_${id}').classList.toggle('hidden-field')">
                    <div class="d-flex justify-content-between">
                        <span>Ticket #${id}</span>
                        <span>v</span>
                    </div>
                </div>
                <div class="ticket-body" id="body_${id}">
                    <div class="row g-3">
                        <div class="col-md-3"><label class="small fw-bold text-danger mb-1">Nº TICKET FISICO</label><input type="text" class="form-control t-numero-ticket" required></div>
                        <div class="col-md-3"><label class="small fw-bold mb-1">CONTACTO</label><select class="form-select t-contacto"><option value="whatsapp">WhatsApp</option><option value="telefono">Teléfono</option></select></div>
                        <div class="col-md-3"><label class="small fw-bold text-success mb-1">IMPORTE (€)</label><input type="number" step="0.01" class="form-control t-importe" required></div>
                        <div class="col-md-3"><label class="small fw-bold mb-1">PASAJEROS</label><div id="pax_${id}"><input type="text" list="sugerencias-pasajeros" class="form-control t-pasajeros" placeholder="Nombre completo"></div><button type="button" class="btn btn-sm btn-link" onclick="addPax(${id})">+ Añadir</button></div>
                        
                        <div class="col-md-6 mt-3"><label class="small fw-bold">FECHA SOLICITUD</label><input type="date" class="form-control t-fechas-solicitud" required></div>
                        <div class="col-md-6 mt-3"><label class="small fw-bold">FECHA SERVICIO</label><input type="date" class="form-control t-fechas-servicio" required></div>

                        <div class="col-md-6 mt-4 p-3 border rounded">
                            <label class="small fw-bold text-primary mb-2 d-block">ORIGEN / RECOGIDA</label>
                            <div class="form-check"><input class="form-check-input t-o-aero" type="checkbox"><label class="small">Aeropuerto</label></div>
                            <div class="form-check"><input class="form-check-input t-o-buque" type="checkbox"><label class="small">Buque</label></div>
                            <div class="form-check"><input class="form-check-input t-o-hotel" type="checkbox" onchange="toggleExt(this, 'oh_${id}')"><label class="small">Hotel</label></div>
                            <input type="text" id="oh_${id}" class="form-control form-control-sm mt-1 hidden-field t-o-hotel-texto" placeholder="Nombre del hotel">
                        </div>
                        <div class="col-md-6 mt-4 p-3 border rounded">
                            <label class="small fw-bold text-primary mb-2 d-block">DESTINO</label>
                            <div class="form-check"><input class="form-check-input t-d-aero" type="checkbox"><label class="small">Aeropuerto</label></div>
                            <div class="form-check"><input class="form-check-input t-d-buque" type="checkbox"><label class="small">Buque</label></div>
                            <div class="form-check"><input class="form-check-input t-d-hotel" type="checkbox" onchange="toggleExt(this, 'dh_${id}')"><label class="small">Hotel</label></div>
                            <input type="text" id="dh_${id}" class="form-control form-control-sm mt-1 hidden-field t-d-hotel-texto" placeholder="Nombre del hotel">
                        </div>

                        <div class="col-12 mt-3"><textarea class="form-control t-comentarios" placeholder="Observaciones extras del viaje..."></textarea></div>
                    </div>
                </div>`;
            document.getElementById('contenedor-tickets').appendChild(div);
            guardarProgreso();
        }

        // --- COMUNICACIÓN BACKEND ---
        document.getElementById('formTaxi').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tickets = Array.from(document.querySelectorAll('.ticket-card')).map(item => ({
                numero_ticket: item.querySelector('.t-numero-ticket').value,
                importe: parseFloat(item.querySelector('.t-importe').value),
                contacto_metodo: item.querySelector('.t-contacto').value,
                fechas_solicitud: [item.querySelector('.t-fechas-solicitud').value],
                fechas_servicio: [item.querySelector('.t-fechas-servicio').value],
                pasajeros: Array.from(item.querySelectorAll('.t-pasajeros')).map(i => i.value).filter(v => v),
                // Variables simplificadas
                o_aeropuerto: item.querySelector('.t-o-aero').checked,
                o_buque: item.querySelector('.t-o-buque').checked,
                o_hotel: item.querySelector('.t-o-hotel').checked,
                o_hotel_texto: item.querySelector('.t-o-hotel-texto').value,
                d_aeropuerto: item.querySelector('.t-d-aero').checked,
                d_buque: item.querySelector('.t-d-buque').checked,
                d_hotel: item.querySelector('.t-d-hotel').checked,
                d_hotel_texto: item.querySelector('.t-d-hotel-texto').value,
                comentarios: item.querySelector('.t-comentarios').value
            }));

            const data = { factura_numero: document.getElementById('factura_numero').value, barco: document.getElementById('barco').value, tickets };
            
            try {
                const res = await fetch(`${URL_BASE}/generar`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
                if(res.ok) {
                    const blob = await res.blob();
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${data.barco}.xlsm`; a.click();
                    limpiarBorrador(false);
                }
            } catch(e) { alert("Error de red"); }
        });

        async function cargarHistorial() {
            try {
                const res = await fetch(`${URL_BASE}/historial`);
                const datos = await res.json();
                const tb = document.getElementById('tabla-historial'); tb.innerHTML = "";
                datos.forEach(f => {
                    tb.innerHTML += `<tr><td>${new Date(f.fecha_creacion).toLocaleDateString()}</td><td>${f.barco}</td><td>${f.numero_factura}</td><td>${f.importe_total.toFixed(2)}€</td><td><button class="btn btn-sm btn-outline-primary">Ver</button></td></tr>`;
                });
            } catch(e) { alert("Error cargando historial"); }
        }

        // --- PERSISTENCIA LOCAL ---
        document.getElementById('formTaxi').addEventListener('input', triggerSave);
        document.getElementById('formTaxi').addEventListener('change', triggerSave);
        let saveTimeout; function triggerSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(guardarProgreso, 1000); }

        function guardarProgreso() {
            const html = document.getElementById('contenedor-tickets').innerHTML;
            const barco = document.getElementById('barco').value;
            const factura = document.getElementById('factura_numero').value;
            const inputs = document.querySelectorAll('#contenedor-tickets input, #contenedor-tickets select, #contenedor-tickets textarea');
            const vals = Array.from(inputs).map(i => ({ value: i.value, checked: i.checked }));
            localStorage.setItem('taxi_borrador_v2', JSON.stringify({html, count: ticketCount, barco, factura, vals}));
        }

        function cargarProgreso() {
            const s = localStorage.getItem('taxi_borrador_v2'); if(!s) return false;
            const p = JSON.parse(s);
            document.getElementById('contenedor-tickets').innerHTML = p.html; ticketCount = p.count;
            document.getElementById('barco').value = p.barco; document.getElementById('factura_numero').value = p.f;
            const inputs = document.querySelectorAll('#contenedor-tickets input, #contenedor-tickets select, #contenedor-tickets textarea');
            inputs.forEach((input, index) => {
                if (input.type === 'checkbox') input.checked = p.vals[index].checked;
                else input.value = p.vals[index].value;
            });
            return true;
        }

        function limpiarBorrador(q) { if(q && !confirm("¿Borrar borrador?")) return; localStorage.removeItem('taxi_borrador_v2'); location.reload(); }
        if(!cargarProgreso()) agregarTicket();
    </script>
</body>
</html>
