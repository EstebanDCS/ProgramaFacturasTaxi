<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Taxi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">Crear Factura Taxi</h2>
        <div class="card p-4 shadow">
            <form id="formTaxi">
                <input type="date" id="fecha" class="form-control mb-3" required>
                <input type="text" id="cliente" class="form-control mb-3" placeholder="Nombre del Cliente / Empresa" required>
                <input type="number" id="importe" class="form-control mb-3" placeholder="Importe Total (€)" step="0.01" required>
                <button type="submit" class="btn btn-success w-100">Generar Documento</button>
            </form>
        </div>
    </div>
    
    <script>
        document.getElementById('formTaxi').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Aquí está tu enlace real de Render conectado a la función /generar
            const URL_RENDER = 'https://programafacturastaxi.onrender.com/generar'; 
            
            const datos = {
                fecha: document.getElementById('fecha').value,
                cliente: document.getElementById('cliente').value,
                importe: parseFloat(document.getElementById('importe').value)
            };

            const boton = e.target.querySelector('button');
            boton.innerText = "Generando Excel...";
            boton.disabled = true;

            try {
                const res = await fetch(URL_RENDER, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                
                if(res.ok) {
                    const blob = await res.blob();
                    const a = document.createElement('a');
                    a.href = window.URL.createObjectURL(blob);
                    a.download = 'Factura_Rellena.xlsm';
                    a.click();
                } else {
                    alert("Hubo un error en el servidor. Revisa si Render está encendido.");
                }
            } catch (err) {
                alert("Error de conexión. Es posible que el servidor de Render esté 'dormido' (tarda unos 30 segundos en despertar si no se usa). Vuelve a darle al botón.");
            }
            
            boton.innerText = "Generar Documento";
            boton.disabled = false;
        });
    </script>
</body>
</html>
