services:
  - type: web
    name: programafacturastaxi
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    nativePackages:
      - libreoffice
    envVars:
      - key: TAXI_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
